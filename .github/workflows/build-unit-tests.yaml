name: Unit Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Checkout Submodules Without ChibiOS
      run: |
        misc/git_scripts/common_submodule_init_without_chibios.sh

    - name: Discover cores
      if: ${{ matrix.os != 'macos-latest' }}
      run: lscpu | egrep 'Model name|Socket|Thread|NUMA|CPU\(s\)'

    - name: Install required software (ubuntu)
      if: ${{ matrix.os != 'macos-latest' }}
      run: |
        sudo bash misc/actions/add-ubuntu-latest-apt-mirrors.sh
        sudo bash misc/actions/ubuntu-install-tools.sh
        bash misc/actions/install-gcovr.sh
        bash misc/actions/install-valgrind.sh

    - name: Install required software (macos)
      if: ${{ matrix.os == 'macos-latest' }}
      run: |
        brew install mtools zip dosfstools flock coreutils

    - name: Print bash version
      run: bash --version

    - name: Test Java Compiler
      run: javac -version

    - name: Print Compiler version
      # NOTE: on mac, this is actually symlink'd to clang, not gcc, but that's ok - we want to build on both
      run: gcc -v

    - name: Handle docs-enums separately just to make github logs more readable
      working-directory: ./unit_tests/
      run: make -j4 docs-enums

    - name: Handle configs separately just to make github logs more readable
      working-directory: ./unit_tests/
      run: make -j4 config

    - name: Build Tests
      working-directory: ./unit_tests/
      run: |
        TIMEFORMAT=%R
        time make -j4 COVERAGE=yes

      # This is expected to fail if run after UTC midnight and the last step was run before UTC midnight
    - name: Build Tests again to assert incremental
      working-directory: ./unit_tests/
      run: |
        TIMEFORMAT=%R
        timeout 30s make -j4 COVERAGE=yes

    - name: Run Tests
      working-directory: ./unit_tests/
      run: ASAN_OPTIONS=detect_stack_use_after_return=1 build/rusefi_test

    - name: Set FTP variables
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
      run: |
        if [ "${{github.ref}}" = "refs/heads/master" ]; then
          echo "RUSEFI_SSH_SERVER=${{secrets.RUSEFI_SSH_SERVER}}" >> $GITHUB_ENV
          echo "RUSEFI_SSH_USER=${{secrets.RUSEFI_SSH_USER}}" >> $GITHUB_ENV
          echo "RUSEFI_SSH_PASS=${{secrets.RUSEFI_SSH_PASS}}" >> $GITHUB_ENV
        fi

    - name: Generate Code Coverage
      if: ${{ matrix.os != 'macos-latest' }}
      working-directory: ./unit_tests/
      run: ./ci_gcov.sh

    - name: Summarize Code Coverage
      if: ${{ matrix.os != 'macos-latest' }}
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: unit_tests/gcov_working_area/gcov/coverage.xml
        badge: true
        format: markdown
        output: both

    - name: Download master coverage artifact
      if: ${{ matrix.os != 'macos-latest' && github.event_name == 'pull_request' }}
      uses: dawidd6/action-download-artifact@v11
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        workflow: build-unit-tests.yaml
        branch: master
        workflow_conclusion: success
        name: rusefi_code_coverage.txt
        path: master_coverage
        if_no_artifact_found: warn

    - name: Add coverage delta vs master
      if: ${{ matrix.os != 'macos-latest' && github.event_name == 'pull_request' }}
      run: |
        python3 - << 'PY'
        import glob
        import os
        import xml.etree.ElementTree as ET

        summary_path = "code-coverage-results.md"
        output_path = "code-coverage-results-with-delta.md"
        current_xml = "unit_tests/gcov_working_area/gcov/coverage.xml"
        master_candidates = glob.glob("master_coverage/**/coverage.xml", recursive=True)

        base_summary = ""
        if os.path.exists(summary_path):
            try:
                with open(summary_path, "r", encoding="utf-8") as f:
                    base_summary = f.read().rstrip()
            except PermissionError:
                base_summary = "Coverage summary generated, but source file was not writable."

        lines = ["", "---", "", "### Coverage Change vs `master`", ""]

        if not os.path.exists(current_xml):
            lines.append("Current coverage file not found.")
        elif not master_candidates:
            lines.append("Master baseline coverage artifact not found.")
        else:
            master_xml = master_candidates[0]

            def line_rate_percent(path: str) -> float:
                root = ET.parse(path).getroot()
                return float(root.attrib["line-rate"]) * 100.0

            current = line_rate_percent(current_xml)
            master = line_rate_percent(master_xml)
            delta = current - master

            if delta > 0:
                trend = "increased"
                sign = "+"
            elif delta < 0:
                trend = "decreased"
                sign = ""
            else:
                trend = "unchanged"
                sign = ""

            lines.append(f"- Current: `{current:.2f}%`")
            lines.append(f"- Master: `{master:.2f}%`")
            lines.append(f"- Delta: `{sign}{delta:.2f}%` ({trend})")

        with open(output_path, "w", encoding="utf-8") as f:
            if base_summary:
                f.write(base_summary + "\n")
            f.write("\n".join(lines) + "\n")
        PY

    - name: Add Coverage PR Comment
      if: ${{ matrix.os != 'macos-latest' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        recreate: true
        path: code-coverage-results-with-delta.md

    - name: Upload code coverage artifacts
      if: ${{ matrix.os != 'macos-latest' }}
      uses: actions/upload-artifact@v7
      with:
        name: rusefi_code_coverage.txt
        path: ./unit_tests/gcov_working_area/gcov

    - name: upload test coverage to remote server
      if: ${{ matrix.os != 'macos-latest' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
      working-directory: ./unit_tests
      run: ./upload_coverage.sh


#   - name: Run Tests (sharded)
#      working-directory: ./unit_tests/
#      run: bash ./run_sharded_tests.sh

    - name: Rebuild Tests For Valgrind
      # Valgrind isn't compatible with address sanitizer, so we have to rebuild the code
      if: ${{ matrix.os != 'macos-latest' }}
      working-directory: ./unit_tests/
      run: |
        make clean
        ./make_for_valgrind.sh

    - name: Run Tests (Valgrind)
      if: ${{ matrix.os != 'macos-latest' }}
      working-directory: ./unit_tests/
      run: ./run_with_valgrind.sh
