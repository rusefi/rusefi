name: Proteus F7 Firmware on macos-latest

on:
  push:
  pull_request:
  workflow_dispatch:


jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: carlosperate/arm-none-eabi-gcc-action@v1.12.3
        with:
          release: '14.2.Rel1'

      - uses: actions/checkout@v6

      - name: Checkout Submodules
        run: |
          misc/git_scripts/common_submodule_init.sh

      - name: Install required software (macos)
        run: |
          brew install mtools zip dosfstools flock coreutils

      - name: Compile hex2dfu
        run: |
          # Compile hex2dfu because the prebuilt binary in the repo is for Linux
          # We need to compile it for both locations where it's used
          curl -L https://raw.githubusercontent.com/rusefi/hex2dfu/rusefi_prod/hex2dfu.c -o misc/encedo_hex2dfu/hex2dfu.c
          gcc -DED25519_SUPPORT=0 misc/encedo_hex2dfu/hex2dfu.c -o misc/encedo_hex2dfu/hex2dfu.bin
          chmod +x misc/encedo_hex2dfu/hex2dfu.bin

          # Wideband firmware also has its own copy
          cp misc/encedo_hex2dfu/hex2dfu.bin firmware/controllers/can/wideband_firmware/firmware/ext/encedo_hex2dfu/hex2dfu.bin
          chmod +x firmware/controllers/can/wideband_firmware/firmware/ext/encedo_hex2dfu/hex2dfu.bin

      - name: Print realpath version
        run: |
          if which grealpath >/dev/null 2>&1; then
            echo "grealpath is installed"
            grealpath --version
          else
            echo "realpath is installed"
            realpath --version || true
          fi

      - name: Print bash version
        run: bash --version

      - name: Test Java Compiler
        run: javac -version

      - name: Build Firmware
        working-directory: ./firmware/config/boards/proteus
        run: ./compile_proteus_f7.sh
