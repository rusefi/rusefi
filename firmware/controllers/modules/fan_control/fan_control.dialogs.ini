;			Engine->Cooling Fans

	dialog = fan1RelaySettings, "Fan 1 On/Off"
		field = "On temperature",					fanOnTemperature
		field = "Off temperature",					fanOffTemperature

	dialog = fan1PwmSettings, "Fan 1 PWM"
		field = "Enable PWM mode",					fan1PwmEnabled
		field = "PWM frequency",					fan1PwmFrequency
		field = "Minimum PWM",						fan1MinPwm
		field = "Maximum PWM",						fan1MaxPwm
		field = "AC compressor adder",				fan1AcAdder
		field = "Soft-start time",					fan1SoftStartSec

	dialog = fan1PwmCurveDialog, "Fan 1 PWM Curve"
		curve = fan1PwmCurve

	dialog = fan1Config, "Fan 1"
		field = "Output",							fanPin, 1, { uiMode == @@UiMode_FULL@@ || uiMode == @@UiMode_INSTALLATION@@ }
		field = "Output mode",						fanPinMode, { uiMode == @@UiMode_FULL@@ || uiMode == @@UiMode_INSTALLATION@@ }
		field = "Enable with AC",					enableFan1WithAc@@if_ts_show_air_conditioning
		field = "Disable when engine stopped",		disableFan1WhenStopped
		field = "Disable above vehicle speed",		disableFan1AtSpeed
		field = "Idle adder",						fan1ExtraIdle
		panel = fan1RelaySettings
		panel = fan1PwmSettings

	dialog = fan2RelaySettings, "Fan 2 On/Off"
		field = "On temperature",					fan2OnTemperature
		field = "Off temperature",					fan2OffTemperature

	dialog = fan2PwmSettings, "Fan 2 PWM"
		field = "Enable PWM mode",					fan2PwmEnabled
		field = "PWM frequency",					fan2PwmFrequency
		field = "Minimum PWM",						fan2MinPwm
		field = "Maximum PWM",						fan2MaxPwm
		field = "AC compressor adder",				fan2AcAdder
		field = "Soft-start time",					fan2SoftStartSec

	dialog = fan2PwmCurveDialog, "Fan 2 PWM Curve"
		curve = fan2PwmCurve

	dialog = fan2Config, "Fan 2"
		field = "Output",							fan2Pin
		field = "Output mode",						fan2PinMode
		field = "Enable with AC",					enableFan2WithAc@@if_ts_show_air_conditioning
		field = "Disable when engine stopped",		disableFan2WhenStopped
		field = "Disable above vehicle speed",		disableFan2AtSpeed
		field = "Idle adder",						fan2ExtraIdle
		panel = fan2RelaySettings
		panel = fan2PwmSettings

	; Both auto-generated indicator panels stacked in the centre column
	dialog = fanIndicatorsCenter, "Status"
		panel = fan_control0IndicatorPanel
		panel = fan_control1IndicatorPanel@@if_ts_show_fan2_settings

	; Simple on/off state + test buttons along the bottom
	indicatorPanel = fanOnOffIndicators, 2
		indicator = { fan1m_state }, "Fan 1 Off", "Fan 1 On", white, black, green, black
		indicator = { fan2m_state }, "Fan 2 Off", "Fan 2 On", white, black, green, black

	dialog = fanBottom, "", xAxis
		panel = fanOnOffIndicators
		commandButton = "Test Fan 1", cmd_test_fan_1
		commandButton = "Test Fan 2", cmd_test_fan_2

	; Fan 1 | Status indicators | Fan 2
	dialog = fanSettings, "Cooling Fans", border
		panel = fan1Config, West
		panel = fanIndicatorsCenter, Center
		panel = fan2Config, East@@if_ts_show_fan2_settings
		panel = fanBottom, South

