# #9714: boards a bundle may connect/tune/reflash beyond its own target (case-insensitive).
# Use '*' for any board.
board_compatibility=uaefi,uaefi121,super-uaefi,uaefi_pro,mre_f4,mre_f7,mre-legacy_f4
auto_update_root_url=https://rusefi.com/build_server
pinout_base_url=https://rusefi.com/docs/
pinout_meta_name=boards_meta.yaml
show_pcan=false
show_simulator=true
show_update_calibrations=false
binary_config_image=true
write_readme_html=true
default_project_name=rusEFI
auto_create_project=false
vin_number_prefix=
show_engine_sniffer_tab=true
show_pinout_tab=true
autoupdate_bundle=true
